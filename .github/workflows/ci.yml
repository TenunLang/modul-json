name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validasi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pasang Tenun
        run: curl -fsSL https://raw.githubusercontent.com/TenunLang/Tenun/main/install.sh | bash
      - name: Validasi modul
        run: |
          mkdir -p proyek/tenun_modul/json
          cp -r src tenun.json proyek/tenun_modul/json/
          cd proyek
          printf 'impor "json";\n' > cek.tenun
          "$HOME/.tenun/bin/tenun" run cek.tenun
          echo "modul json valid"
      - name: Uji unit
        run: |
          "$HOME/.tenun/bin/tenun" check .
